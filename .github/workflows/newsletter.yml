name: Morning Intelligence

on:
  schedule:
    # GitHub cron is UTC and has no DST awareness, so we fire at BOTH the
    # CDT (summer) and CST (winter) equivalents of 7:00 AM Central and let the
    # guard step below let exactly one of them through each day.
    - cron: "0 12 * * *"   # 07:00 America/Chicago during CDT (UTC-5)
    - cron: "0 13 * * *"   # 07:00 America/Chicago during CST (UTC-6)
  workflow_dispatch:
    inputs:
      test_only:
        description: "Send only to Orhan and do not consume chart-of-the-day state"
        type: boolean
        default: true

# Never let two runs overlap (e.g. a manual run during the scheduled window).
concurrency:
  group: morning-intelligence
  cancel-in-progress: false

permissions:
  contents: write   # lets the run commit the small chart-state file back

jobs:
  deliver:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Decide whether this run should proceed
        id: guard
        run: |
          TODAY=$(TZ=America/Chicago date +%F)
          HOUR=$(TZ=America/Chicago date +%H)
          LAST=$(cat output/last_sent.txt 2>/dev/null || echo "none")
          echo "Central date=$TODAY hour=$HOUR | last sent=$LAST | event=${{ github.event_name }}"
          echo "today=$TODAY" >> "$GITHUB_OUTPUT"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "Manual run: proceeding."
            echo "run=true" >> "$GITHUB_OUTPUT"
            # Only a real (non-test) manual run should claim today's slot.
            if [ "${{ inputs.test_only }}" = "true" ]; then
              echo "mark=false" >> "$GITHUB_OUTPUT"
            else
              echo "mark=true" >> "$GITHUB_OUTPUT"
            fi
          elif [ "$LAST" = "$TODAY" ]; then
            echo "Today's edition already went out; skipping this trigger."
            echo "run=false" >> "$GITHUB_OUTPUT"
            echo "mark=false" >> "$GITHUB_OUTPUT"
          elif [ "$HOUR" -ge 7 ]; then
            echo "Not yet sent today and it is past 7am Central: proceeding."
            echo "run=true" >> "$GITHUB_OUTPUT"
            echo "mark=true" >> "$GITHUB_OUTPUT"
          else
            echo "Before 7am Central; skipping (the next trigger will send)."
            echo "run=false" >> "$GITHUB_OUTPUT"
            echo "mark=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Python
        if: steps.guard.outputs.run == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install fonts and dependencies
        if: steps.guard.outputs.run == 'true'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq fonts-dejavu-core
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate and send the newsletter
        if: steps.guard.outputs.run == 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          # On a manual test run, restrict delivery and preserve rotation state.
          OMI_RECIPIENTS: ${{ (github.event_name == 'workflow_dispatch' && inputs.test_only) && 'orhanerdem@gmail.com' || '' }}
          OMI_PRESERVE_CHART_STATE: ${{ (github.event_name == 'workflow_dispatch' && inputs.test_only) && 'true' || '' }}
        run: python main.py

      - name: Record today's send
        if: steps.guard.outputs.run == 'true' && steps.guard.outputs.mark == 'true'
        run: |
          mkdir -p output
          echo "${{ steps.guard.outputs.today }}" > output/last_sent.txt

      - name: Persist run state
        if: steps.guard.outputs.run == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          changed=false
          for f in output/chart_of_the_day_state.json output/last_sent.txt; do
            if [ -f "$f" ]; then git add -f "$f" && changed=true; fi
          done
          if [ "$changed" = "true" ] && ! git diff --cached --quiet; then
            git commit -m "Update run state [skip ci]"
            git push
          else
            echo "No state change to commit."
          fi
